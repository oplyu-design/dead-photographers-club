<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>죽은 사진사 클럽 (Photo Baking Club)</title>
    <style>
        /* 🎨 따끈따끈하고 말랑한 베이커리 카페 톤앤매너 */
        :root {
            --bg-color: #fcf8f2;       /* 부드러운 우유 빛깔 base */
            --card-bg: #ffffff;
            --accent-color: #ff9f43;    /* 노릇노릇하게 잘 구워진 빵 색 */
            --point-color: #e67e22;     /* 찐한 캐러멜 시럽 색 */
            --text-main: #4a3728;      /* 따뜻한 초콜릿 브라운 */
            --text-sub: #a08c7d;       /* 포근한 밀가루 감성 그레이 */
            --border-color: #f1e5d7;    /* 보드라운 바닐라 크림 선 */
            --input-bg: #faf4ec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 25px 15px;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.5;
        }

        header {
            text-align: center;
            padding: 30px 0 20px 0;
        }

        header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--point-color);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        header p {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* 🥐 폭신폭신한 탭 메뉴 */
        .tab-container {
            display: flex;
            margin-bottom: 20px;
            background: #f0e2d3;
            padding: 6px;
            border-radius: 20px;
        }

        .tab-button {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .tab-button.active {
            background: var(--card-bg);
            color: var(--point-color);
            box-shadow: 0 4px 10px rgba(74, 55, 40, 0.1);
        }

        /* 🥞 둥글둥글 귀여운 요리 스튜디오 카드 외관 */
        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(160, 140, 125, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* 요리 타이틀 데코 */
        .card h2 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 18px;
            color: var(--point-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        select, input {
            width: 100%;
            padding: 12px 14px;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            background-color: var(--card-bg);
            border-color: var(--accent-color);
        }

        /* 🍳 맛있게 굽기 버터 발린 버튼 */
        button.primary-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            font-weight: 800;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(255, 159, 67, 0.3);
        }

        button.primary-btn:hover {
            background-color: var(--point-color);
            transform: translateY(-1px);
        }

        button.primary-btn:active {
            transform: translateY(0);
        }

        /* 🧺 나의 식재료(장비) 바구니 리스트 */
        .camera-list {
            max-height: 150px;
            overflow-y: auto;
            border: 2px dashed var(--border-color);
            border-radius: 14px;
            background: var(--input-bg);
            margin-top: 8px;
        }

        .camera-item {
            padding: 10px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .camera-item:last-child {
            border-bottom: none;
        }

        .camera-item b {
            color: var(--point-color);
            font-weight: 700;
            margin-right: 4px;
        }

        .delete-btn {
            background: #ff7675;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
        }

        /* 🍰 갓 구워진 비주얼의 결과창 연출 */
        #recommendation-result {
            display: none;
            border: 3px solid var(--accent-color);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fffefb;
        }

        .mission-box {
            background: #fff5eb;
            border: 2px solid #ffe3cc;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            position: relative;
        }

        .mission-number {
            font-size: 12px;
            color: var(--point-color);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .mission-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.5;
            color: var(--text-main);
        }

        .recipe-box {
            background: #faf4ec;
            border: 2px dashed #e6d5c3;
            padding: 16px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.6;
            color: #5c4738;
        }

        .recipe-box b {
            color: var(--point-color);
            font-weight: 700;
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>🍞 죽은 사진사 클럽 🍳</h1>
        <p>맛있는 셔터를 굽는 베이킹 레시피 스튜디오</p>
    </header>

    <div class="tab-container">
        <button id="tab-film" class="tab-button active" onclick="switchTab('film')">🎞️ 필카 밀가루</button>
        <button id="tab-digital" class="tab-button" onclick="switchTab('digital')">📟 디카 파우더</button>
        <button id="tab-camcorder" class="tab-button" onclick="switchTab('camcorder')">📹 캠코더 시럽</button>
    </div>

    <div class="card">
        <h2 id="card-archive-title">🥣 재료 보관함 (필카 고르기)</h2>
        <div class="form-group">
            <label for="camera-type">식재료 카테고리</label>
            <select id="camera-type">
                <option value="35mm 수동필카">35mm 수동필카</option>
                <option value="35mm 자동필카(똑딱이)">35mm 자동필카(똑딱이)</option>
                <option value="중형 120필름">중형 120필름</option>
            </select>
        </div>
        <div class="form-group">
            <label for="camera-name">장비 모델명 적기</label>
            <input type="text" id="camera-name" placeholder="예: 미놀타 X-700, 올림푸스 뮤2">
        </div>
        <button class="primary-btn" onclick="addCamera()">수납장에 차곡차곡 넣기 🧺</button>

        <div class="form-group" style="margin-top: 20px;">
            <label>🛒 지금 수납장에 들어있는 장비</label>
            <div class="camera-list" id="my-camera-list"></div>
        </div>
    </div>

    <div class="card">
        <h2>🔥 오늘의 출사 오븐 예열</h2>
        <div class="form-group">
            <label for="select-my-camera">오늘 요리할 도구(장비)</label>
            <select id="select-my-camera">
                <option value="">수납장에서 재료를 먼저 꺼내주세요!</option>
            </select>
        </div>
        <div class="form-group">
            <label for="weather-type">지금 창밖의 날씨/온도</label>
            <select id="weather-type">
                <option value="bright">☀️ 쨍하게 잘 익은 맑은 날</option>
                <option value="dark">☁️ 꾸덕하고 흐린 날 / 밤공기</option>
                <option value="rainy">☔ 촉촉하게 비 내리는 날</option>
                <option value="indoor">🏠 포근한 실내 무드 / 내 방</option>
            </select>
        </div>
        <button class="primary-btn" style="background-color: var(--point-color); box-shadow: 0 4px 10px rgba(230,126,34,0.3);" onclick="recommendCamera()">오늘의 셔터 베이킹 시작! 🍩</button>
    </div>

    <div class="card" id="recommendation-result">
        <h2>🍰 띵동! 갓 구워진 오늘의 시선</h2>
        <div class="mission-box">
            <div class="mission-number" id="result-mission-id">BAKING MISSION #001</div>
            <div class="mission-title" id="result-mission-text">빛과 그림자가 마찰하는 골목 계단 크롭하기</div>
        </div>
        <div class="recipe-box" id="result-recipe-text"></div>
    </div>

    <script>
        let currentMode = 'film';
        let myCameras = JSON.parse(localStorage.getItem('dps_cameras')) || [];

        // 365개 초거대 감성 미션 데이터베이스 (일부 축약/유지)
        const missionPool = [
            "골목길 담벼락에 길게 늘어진 전신주와 전선의 가위바위보 실루엣 크롭하기",
            "비 온 뒤 보도블록 틈새 물웅덩이에 완벽하게 대칭으로 뒤집힌 동네 빌라 풍경",
            "한낮의 아파트 복도, 창살 틈새로 칼날처럼 길게 쏟아지는 하이라이트 빛 한 줄기",
            "오래된 철제 대문의 칠이 벗겨져 드러난 녹슨 속살과 거친 질감 클로즈업",
            "해 질 무렵 버스 창가에 이마를 기대고 바라본, 가로등 불빛이 번지는 가로수길",
            "주택가 골목길 구석, 주인을 기다리며 비스듬히 세워진 낡은 자전거의 옆모습",
            "동네 야채가게 앞 알록달록한 플라스틱 바구니들과 그 위를 비추는 주황색 알로겐 조명",
            "낡은 빌라 우편함 속 주인을 찾지 못해 구겨지고 빛바랜 광고 전단지들의 레이어",
            "대문 옆 화단, 시멘트 틈새를 뚫고 꿋꿋하게 자라난 이름 모를 잡초의 로우앵글",
            "오후 4시의 아파트 놀이터, 아무도 없는 그네가 혼자 미세하게 흔들리는 쓸쓸함",
            "가로등 불빛이 밤나무 잎사귀들을 아래에서 비추어 만든 초현실적인 연두색 밤풍경",
            "시장 리어카 위에서 돌아가는 카세트테이프들과 먼지 앉은 라디오 안테나의 정취",
            "비 내리는 날, 카페 통유리창에 맺힌 투명한 빗방울과 그 뒤로 흐릿해진 바깥 세상",
            "오래된 책방 구석, 세월의 마찰력으로 누렇게 바래버린 종이 서적들의 조밀한 층",
            "한밤중, 편의점 야외 테이블 조명이 밤거리로 새어 나오며 만드는 과도한 밝음의 경계",
            "겨울날, 누군가 주차된 자동차 보닛 위에 정성스레 만들어 두고 간 주먹만 한 눈사람",
            "지하 주차장 경사로를 타고 내려오는 비스듬하고 묵직한 콘크리트 위 빛의 사선",
            "길가에 버려진 낡은 소파 위에 뻔뻔하게 올라가 나른하게 낮잠을 청하는 길고양이",
            "새벽녘 가로등이 꺼지기 직전, 온 도시를 감싸 안는 차갑고 푸르스름한 새벽 공기감",
            "해 질 무렵 육교 위, 퇴근길 자동차들이 뿜어내는 헤드라이트의 붉고 노란 강물"
        ];

        const filmRecipeDatabase = {
            bright: "🎞️ <b>추천 밀가루: 후지 컬러 C200 / 코닥 컬러플러스 200</b><br>• 노릇노릇한 주간 직사광선 아래서 바삭바삭한 원색의 대비를 단단하게 구워내는 레시피예요. 타지 않게 하이라이트 노출을 살짝 신경 써주세요!",
            dark: "🎞️ <b>추천 밀가루: 코닥 골드 200 / 포트라 400</b><br>• 흐린 날의 꾸덕하고 푸르스름한 공기를 달콤하게 감싸 안아주는 카멜 시럽 입자감 매칭입니다. 암부가 뭉개지지 않고 포근하게 표현돼요.",
            rainy: "🎞️ <b>추천 밀가루: 후지 수페리아 엑스트라 400 / 시네스틸 50D</b><br>• 빗길의 물기 어린 반사광을 민트소다처럼 청량하게 스캔해 냅니다. 촉촉하게 젖은 풍경에 가장 알맞은 반죽법이랍니다.",
            indoor: "🎞️ <b>추천 밀가루: 코닥 울트라맥스 400 / 포트라 800</b><br>• 따뜻한 카페 조명 아래서 에스프레소처럼 진하고 고풍스러운 나무 가구의 텍스처를 묵직하게 뽑아내 주는 꿀조합 레시피입니다."
        };

        const digitalColorDatabase = {
            ccd_compact: {
                bright: `🎨 <b>Y2K 달콤 밀크티 레시피</b><br>• <b>화이트밸런스:</b> 흐림(Cloudy) 또는 6000K<br>• <b>노출 보정:</b> +0.3ev ~ +0.7ev | <b>ISO:</b> 100~200 고정<br>• <b>베이킹 팁:</b> 구형 CCD 센서 특유의 찐득하고 따뜻한 노란 조도가 강렬한 햇빛과 섞여 부드러운 밀크티 색감으로 반죽됩니다.`,
                dark: `🎨 <b>2000s 미니홈피 도토리 레시피</b><br>• <b>화이트밸런스:</b> 일광(Daylight) | <b>노출 보정:</b> -0.3ev<br>• <b>채도/콘트라스트:</b> +1 (강렬한 원색 유도)<br>• <b>베이킹 팁:</b> 흐린 날의 밋밋함을 지우고 채도를 올려 세기말 하두리 캠이나 옛날 미니홈피 감성의 쨍한 원색 대비를 만들어냅니다.`,
                rainy: `🎨 <b>바삭한 통밀 팝콘 플래시 레시피</b><br>• <b>화이트밸런스:</b> 자동(AWB) | <b>노출 보정:</b> -0.3ev<br>• <b>ISO 감도:</b> 800 ~ 1600 고정 | <b>플래시:</b> 강제 발광 (ON) 🔥<br>• <b>베이킹 팁:</b> 밤비의 노이즈를 역이용해보세요! 플래시를 터트리면 토이카메라 파파라치 스냅 같은 힙한 동굴 효과가 구워집니다.`,
                indoor: `🎨 <b>앤티크 카페 조명 조리법</b><br>• <b>화이트밸런스:</b> 백열등(Tungsten) 또는 3000K 고정 | <b>노출:</b> -0.3ev<br>• <b>베이킹 팁:</b> 주황색 카페 조명 아래서 차가운 푸른빛을 슬쩍 얹어, 묘하게 나른하고 신비로운 을지로 힙스터 감성 실내 무드를 뽑아냅니다.`
            },
            toy_pop: {
                bright: `🎨 <b>올드 팝아트 체리 레시피</b><br>• <b>화이트밸런스:</b> 자동(AWB) | <b>컬러 모드:</b> 크롬(Chrome) 또는 채도 최고치<br>• <b>베이킹 팁:</b> 새파란 하늘과 새빨간 사물들을 로모그래피 필름처럼 엄청나게 쨍한 비비드 식감으로 맛있게 인쇄해 줍니다.`,
                dark: `🎨 <b>녹차 말차 필름 레시피</b><br>• <b>화이트밸런스:</b> 그늘(Shadow) | <b>노출 보정:</b> +0.3ev | <b>채도:</b> -1<br>• <b>베이킹 팁:</b> 아련한 녹색과 브라운 톤이 극대화되어, 흐린 골목길의 식물이나 벽돌을 찍으면 빈티지 일러스트 엽서북처럼 구워집니다.`,
                rainy: `🎨 <b>달콤 오렌지 팝 레시피</b><br>• <b>화이트밸런스:</b> 7000K 강제 오버 | <b>비네팅 효과:</b> ON (최대치)<br>• <b>베이킹 팁:</b> 비 오는 풍경과 완전 반대되는 따뜻한 톤을 강제로 먹여 장난감 카메라 고유의 키치하고 귀여운 왜곡을 즐기는 빌드입니다.`,

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-film').classList.toggle('active', mode === 'film');
            document.getElementById('tab-digital').classList.toggle('active', mode === 'digital');
            document.getElementById('tab-camcorder').classList.toggle('active', mode === 'camcorder');
            
            const archiveTitle = document.getElementById('card-archive-title');
            const cameraTypeSelect = document.getElementById('camera-type');
            
            if (mode === 'film') {
                archiveTitle.innerText = "🥣 재료 보관함 (필카 고르기)";
                cameraTypeSelect.innerHTML = `
                    <option value="35mm 수동필카">35mm 수동필카</option>
                    <option value="35mm 자동필카(똑딱이)">35mm 자동필카(똑딱이)</option>
                    <option value="중형 120필름">중형 120필름</option>
                `;
            } else if (mode === 'digital') {
                archiveTitle.innerText = "🥣 재료 보관함 (디카 고르기)";
                cameraTypeSelect.innerHTML = `
                    <option value="Y2K 구형 CCD 디카">📟 Y2K 구형 CCD 디카 (똑딱이)</option>
                    <option value="토이카메라 / 파인픽스 올드 팝">🧸 토이카메라 / 파인픽스 올드 팝</option>
                    <option value="하이엔드 디카">📷 하이엔드 디카 (리코/소니RX)</option>
                    <option value="미러리스 / DSLR">🔮 미러리스 / DSLR</option>
                `;
            } else if (mode === 'camcorder') {
                archiveTitle.innerText = "🥣 재료 보관함 (캠코더 고르기)";
                cameraTypeSelect.innerHTML = `
                    <option value="6mm 테이프 DV 캠코더">📼 6mm 테이프 DV 캠코더</option>
                    <option value="하이브리드 메모리 캠코더">🔋 하이브리드 메모리 캠코더 (작티계열)</option>
                    <option value="토이 빈티지 캠코더">🧸 토이 빈티지 캠코더</option>
                `;
            }

            updateCameraSelect();
            renderCameraList();
            document.getElementById('recommendation-result').style.display = 'none';
        }

        function addCamera() {
            const typeSelect = document.getElementById('camera-type');
            const nameInput = document.getElementById('camera-name');
            const type = typeSelect.value;
            const name = nameInput.value.trim();
            
            if (!name) {
                alert("기종 이름을 꼭 적어주세요! 🍩");
                return;
            }
            
            const newCamera = { id: Date.now(), mode: currentMode, type: type, name: name };
            myCameras.push(newCamera);
            localStorage.setItem('dps_cameras', JSON.stringify(myCameras));
            
            nameInput.value = "";
            renderCameraList();
            updateCameraSelect();
        }

        function deleteCamera(id) {
            myCameras = myCameras.filter(cam => cam.id !== id);
            localStorage.setItem('dps_cameras', JSON.stringify(myCameras));
            renderCameraList();
            updateCameraSelect();
        }

        function renderCameraList() {
            const listContainer = document.getElementById('my-camera-list');
            listContainer.innerHTML = "";
            const filtered = myCameras.filter(cam => cam.mode === currentMode);
            
            if (filtered.length === 0) {
                listContainer.innerHTML = `<div style="padding: 18px; font-size:13px; color:var(--text-sub); text-align:center;">지금은 바구니가 비어있어요 🧺</div>`;
                return;
            }
            
            filtered.forEach(cam => {
                const item = document.createElement('div');
                item.className = 'camera-item';
                item.innerHTML = `
                    <span><b>[${cam.type}]</b> ${cam.name}</span>
                    <button class="delete-btn" onclick="deleteCamera(${cam.id})">빼기</button>
                `;
                listContainer.appendChild(item);
            });
        }

        function updateCameraSelect() {
            const select = document.getElementById('select-my-camera');
            select.innerHTML = "";
            const filtered = myCameras.filter(cam => cam.mode === currentMode);
            
            if (filtered.length === 0) {
                select.innerHTML = `<option value="">여기에 넣을 재료를 먼저 등록해 주세요!</option>`;
                return;
            }
            
            filtered.forEach(cam => {
                const opt = document.createElement('option');
                opt.value = cam.id;
                opt.innerText = `[${cam.type}] ${cam.name}`;
                select.appendChild(opt);
            });
        }

        function recommendCamera() {
            const cameraSelect = document.getElementById('select-my-camera');
            const weatherSelect = document.getElementById('weather-type');
            const cameraId = cameraSelect.value;
            const selectedWeather = weatherSelect.value;
            
            if (!cameraId || cameraId.includes("등록") || cameraId.includes("재료")) {
                alert("오늘 쓸 재료 도구를 수납장에서 쏙 골라주세요! 🥯");
                return;
            }
            
            const selectedCamera = myCameras.find(cam => cam.id == cameraId);
            if (!selectedCamera) return;
            
            const randomIdx = Math.floor(Math.random() * missionPool.length);
            const selectedMission = missionPool[randomIdx];
            const missionNum = String(randomIdx + 1).padStart(3, '0');
            
            document.getElementById('result-mission-id').innerText = `🧁 BAKING MISSION #${missionNum}`;
            document.getElementById('result-mission-text').innerText = selectedMission;
            
            let recipeHtml = "";
            
            if (currentMode === 'film') {
                recipeHtml = filmRecipeDatabase[selectedWeather];
            } else if (currentMode === 'digital') {
                let digiKey = "mirrorless";
                if (selectedCamera.type.includes("CCD")) digiKey = "ccd_compact";
                else if (selectedCamera.type.includes("토이카메라")) digiKey = "toy_pop";
                else if (selectedCamera.type.includes("하이엔드")) digiKey = "high_end";
                
                recipeHtml = digitalColorDatabase[digiKey][selectedWeather];
            } else if (currentMode === 'camcorder') {
                let camKey = "hybrid_memory";
                if (selectedCamera.type.includes("6mm")) camKey = "dv_6mm";
                else if (selectedCamera.type.includes("토이")) camKey = "toy_video";
                
                recipeHtml = camcorderRecipeDatabase[camKey][selectedWeather];
            }
            
            document.getElementById('result-recipe-text').innerHTML = recipeHtml;
            document.getElementById('recommendation-result').style.display = 'block';
            document.getElementById('recommendation-result').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = function() {
            switchTab('film');
        };
    </script>
</body>
</html>
