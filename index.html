<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>죽은 사진사 클럽 (Photo Baking Club)</title>
    <style>
        /* 🎨 깔끔하고 따뜻한 베이커리 카페 톤앤매너 */
        :root {
            --bg-color: #fcf8f2;
            --card-bg: #ffffff;
            --accent-color: #ff9f43;    /* 노릇노릇한 빵 색 */
            --point-color: #e67e22;     /* 달콤한 캐러멜 색 */
            --text-main: #4a3728;      /* 코코아 브라운 */
            --text-sub: #a08c7d;       /* 부드러운 크림 그레이 */
            --border-color: #f1e5d7;
            --input-bg: #faf4ec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 25px 15px;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.5;
        }

        header {
            text-align: center;
            padding: 20px 0 25px 0;
        }

        header h1 {
            font-size: 25px;
            font-weight: 800;
            color: var(--point-color);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        header p {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* 🥞 동글둥글하고 포근한 카드 레이아웃 */
        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 6px 14px rgba(160, 140, 125, 0.06);
        }

        .card h2 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 18px;
            color: var(--point-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .flex-group {
            display: flex;
            gap: 10px;
        }

        .flex-group > div {
            flex: 1;
        }

        select, input {
            width: 100%;
            padding: 12px 14px;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            background-color: var(--card-bg);
            border-color: var(--accent-color);
        }

        /* 🍳 버튼 컴포넌트 */
        button.primary-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            font-weight: 800;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(255, 159, 67, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button.primary-btn:hover {
            background-color: var(--point-color);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        /* 🧺 스크롤 목록 */
        .scroll-list {
            max-height: 180px;
            overflow-y: auto;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            background: var(--input-bg);
            margin-top: 8px;
        }

        .list-item {
            padding: 12px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item b {
            color: var(--point-color);
            font-weight: 700;
        }

        .delete-btn {
            background: #ff7675;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
        }

        /* 🍰 갓 구워진 비주얼의 결과창 */
        #recommendation-result {
            display: none;
            border: 3px solid var(--accent-color);
            animation: popUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            background: #fffefb;
        }

        /* 이미지 캡처 대상이 될 구역 패딩 및 배경 통일 */
        .capture-area {
            background: #fffefb;
            padding: 4px;
            border-radius: 12px;
        }

        .mission-box {
            background: #fff5eb;
            border: 2px solid #ffe3cc;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 14px;
        }

        .mission-badge {
            display: inline-block;
            font-size: 11px;
            background-color: var(--point-color);
            color: white;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .mission-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.5;
            color: var(--text-main);
        }

        .recipe-box {
            background: #faf4ec;
            border: 2px dashed #e6d5c3;
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            color: #5c4738;
        }

        .recipe-box b {
            color: var(--point-color);
        }

        /* 🧾 영구 아카이브 아이템 디자인 */
        .archive-item {
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            padding: 14px;
        }
        .archive-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-sub);
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 6px;
        }
        .archive-header b {
            color: var(--point-color);
        }
        .archive-actions {
            display: flex;
            gap: 6px;
        }
        .save-img-btn {
            background: #4cd137;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>🍳 죽은 사진사 클럽 🍞</h1>
        <p>오늘의 출사 셔터를 맛있게 굽는 레시피 스튜디오</p>
    </header>

    <div class="card">
        <h2>🥣 장비 보관함 등록</h2>
        <div class="form-group flex-group">
            <div>
                <label for="camera-main-type">종류</label>
                <select id="camera-main-type" onchange="handleMainTypeChange()">
                    <option value="film">🎞️ 필름 카메라</option>
                    <option value="digital">📟 디지털 카메라</option>
                    <option value="camcorder">📹 빈티지 캠코더</option>
                </select>
            </div>
            <div>
                <label for="camera-sub-type">상세 분류</label>
                <select id="camera-sub-type">
                    <option value="35mm 수동필카">35mm 수동필카</option>
                    <option value="35mm 자동필카">35mm 자동필카</option>
                    <option value="중형 120필름">중형 120필름</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="camera-name">모델명 입력</label>
            <input type="text" id="camera-name" placeholder="예: 미놀타 X-700, 올림푸스 뮤2, 리코 GR">
        </div>
        <button class="primary-btn" onclick="addCamera()">보관함 수납장에 등록하기 🧺</button>

        <div class="form-group" style="margin-top: 20px;">
            <label>🛒 등록된 내 장비 바구니</label>
            <div class="scroll-list" id="my-camera-list"></div>
        </div>
    </div>

    <div class="card">
        <h2>🔥 오늘의 레시피 오븐 예열</h2>
        <div class="form-group">
            <label for="select-my-camera">오늘 요리할 도구 선택</label>
            <select id="select-my-camera">
                <option value="">장비를 먼저 등록해 주세요!</option>
            </select>
        </div>
        <div class="form-group">
            <label for="weather-type">지금 창밖의 환경과 날씨</label>
            <select id="weather-type">
                <option value="bright">☀️ 쨍하게 맑은 날</option>
                <option value="dark">☁️ 어둑하고 흐린 날 / 밤공기</option>
                <option value="rainy">☔ 촉촉하게 비 내리는 날</option>
                <option value="indoor">🏠 아늑한 실내 / 내 방 무드</option>
            </select>
        </div>
        <button class="primary-btn" style="background-color: var(--point-color); box-shadow: 0 4px 10px rgba(230,126,34,0.2);" onclick="recommendCamera()">오늘의 셔터 베이킹 시작! 🍩</button>
    </div>

    <div class="card" id="recommendation-result">
        <h2>🍰 띵동! 오늘의 추천 레시피 완성</h2>
        
        <div class="capture-area" id="today-capture-zone">
            <div class="mission-box">
                <div class="mission-badge">TODAY'S MISSION</div>
                <div class="mission-title" id="result-mission-text">빛과 그림자가 마찰하는 골목 계단 크롭하기</div>
            </div>
            <div class="recipe-box" id="result-recipe-text"></div>
        </div>

        <div class="btn-group">
            <button class="primary-btn" style="background-color: #2ecc71; box-shadow: 0 4px 10px rgba(46,204,113,0.15);" onclick="saveCurrentRecipe()">노트에 기록 저장 📝</button>
            <button class="primary-btn" style="background-color: #3498db; box-shadow: 0 4px 10px rgba(52,152,219,0.15);" onclick="downloadCapture('today-capture-zone', '오늘의_셔터_레시피')">미션 완료 이미지 저장 📸</button>
        </div>
    </div>

    <div class="card">
        <h2>📖 나만의 출
